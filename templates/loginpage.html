<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <title>COGNITO Login Page</title>
    <script type= "module" src="/static/login.js" defer ></script>

</head>

<body>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>REGISTER YOURSELF</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-github"></i></a>
                    <a href="#" class="icon"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for Login</span>
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button>Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in">
            <form>
                <h1>Log In</h1>
                <div class="social-icons">
                    <a href="#" class="icon"><i class="fa-brands fa-google-plus-g"></i></a>
                </div>
                <span>or use your email for Login</span>
                
                <input type="email" placeholder="Email" id= "emailid" required>
                <input type="password" placeholder="Password" id=" password" required>
                <a href="#">Forget Your Password?</a>
                <button id=" submit">LOG IN</button>
            </form>
        </div>
                <div class="toggle-panel toggle-right">
                    <img src="/static/ezgif-3-bf69f7fb8d.jpg">
                </div>
            </div>
        </div>
    </div>

    <script type= "module" src="/static/register.js" defer ></script>
</body>

</html>
